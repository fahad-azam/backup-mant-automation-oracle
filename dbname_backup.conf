# Database backup configuration
# Required parameters
BACKUP_BASE="/u01/backup"
LOG_DIR="/u01/logs/rman"

# Optional: Email recipient for failure notifications
MAIL_TO="dba@example.com"

# Optional: Number of RMAN channels (default: 2)
# General channels for all backup types
CHANNELS=2

# OR specify channel counts per backup type (overrides CHANNELS)
CHANNELS_FULL=4
CHANNELS_INCR0=4
CHANNELS_ARCH=2
